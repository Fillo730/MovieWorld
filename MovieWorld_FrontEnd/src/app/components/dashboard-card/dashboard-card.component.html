<mat-card class="info-card card-border-theme background-color-custom-ligher">
    <mat-card-content>
        <div class="icon-box" [ngClass]="colorClass"><mat-icon>{{icon}}</mat-icon></div>
        <div class="stat-info">
        <p class="text-color opacity-7 m-0">{{ label }}</p>
        <h2 class="text-color m-0 font-bold">{{ value  | number: '1.0-2'}}</h2>
        </div>
    </mat-card-content>
</mat-card>
