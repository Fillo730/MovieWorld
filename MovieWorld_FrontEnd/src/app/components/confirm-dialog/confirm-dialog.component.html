<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content [innerHTML]="data.text">
    
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onNoClick()">{{ data.cancelButtonLabel }}</button>
    <button mat-flat-button color="warn" [mat-dialog-close]="true">{{ data.successButtonLabel }}</button>
</mat-dialog-actions>
