<div class="background-color-custom-ligher text-color">
    <h4 class="fw-bold mb-4 p-3 mainTitle">{{ mainTitle }}</h4>

    <div class="p-4 rounded width-custom-filters">

        <div class="mb-3">
            <label class="form-label fw-semibold">{{ filterCityLabel }}</label>

            <ul class="list-unstyled">

                @for (city of availableCities; track city) {
                    <li class="mb-2">
                        <input 
                            type="radio"
                            name="cityFilter"
                            [checked]="filters.city === city"
                            (change)="onCitySelect(city)"
                        />
                        <span class="ms-2">{{ city }}</span>
                    </li>
                }

                <li class="mt-3">
                    <input 
                        type="radio"
                        name="cityFilter"
                        [checked]="filters.city === ''"
                        (change)="onCitySelect('')"
                    />
                    <span class="ms-2">{{ allCitiesLabel }}</span>
                </li>

            </ul>

        </div>

    </div>

</div>
