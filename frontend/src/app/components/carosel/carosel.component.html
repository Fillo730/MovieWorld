<div class="wrapper">
    <p-carousel
    [value]="movies ?? images"
    [numVisible]="4"
    [numScroll]="1"
    [autoplayInterval]="4000"
    [responsiveOptions]="responsiveOptions"
    [circular]="true"
>
    <ng-template let-item #item>
        @if (movies) {
            <div class="p-3 carousel-card" (click)="handleMovieClick(item)">
                <img [src]="item.imagePath" class="carousel-image border-round" />
                <div class="carousel-caption border-round-bottom">
                    <span class="carousel-title">{{ item.title }}</span>
                </div>
            </div>
        } @else {
            <div class="p-3">
                <img [src]="item" class="carousel-image" />
            </div>
        }
    </ng-template>
    </p-carousel>

</div>
